<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timeplanlegger – Videregående Hjelp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0d2340; --navy-mid: #1a3a5c; --accent: #3b7dd8;
    --bg: #f2f5f9; --surface: #ffffff; --surface2: #eef2f8;
    --text: #0d2340; --text-muted: #5a7399; --border: #d4dff0;
    --radius: 14px; --shadow: 0 4px 24px rgba(13,35,64,0.10);
  }
  body { font-family: 'Inter Tight', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; }
  header { background: var(--navy); padding: 22px 40px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  header h1 { color: #fff; font-size: 20px; font-weight: 700; letter-spacing: -0.02em; margin-right: auto; }
  .back-link { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
  .back-link:hover { color: #fff; }
  
  .container { max-width: 1200px; margin: 0 auto; padding: 36px 20px 80px; }
  
  .controls { display: flex; justify-content: space-between; margin-bottom: 24px; align-items: center; }
  .btn { padding: 10px 20px; border-radius: 8px; font-family: 'Inter Tight', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--navy); }
  .btn-ghost { background: transparent; color: var(--text-muted); border: 1.5px solid var(--border); }
  .btn-ghost:hover { border-color: var(--red); color: var(--red); }

  .schedule-container { overflow-x: auto; background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; }
  
  table { width: 100%; border-collapse: collapse; min-width: 800px; }
  th, td { border: 1px solid var(--border); padding: 0; text-align: center; vertical-align: middle; }
  th { padding: 16px; background: var(--surface2); color: var(--navy); font-weight: 700; text-transform: uppercase; font-size: 12px; letter-spacing: 0.05em; }
  
  .time-col { width: 80px; color: var(--text-muted); font-weight: 600; font-size: 12px; background: var(--surface2); }
  
  .cell-input { width: 100%; height: 100%; border: none; padding: 16px; font-family: 'Inter Tight', sans-serif; font-size: 14px; font-weight: 500; text-align: center; min-height: 60px; resize: none; background: transparent; color: var(--text); }
  .cell-input:focus { outline: none; background: #f0f7ff; }

  @media print {
    header, .controls, .back-link { display: none; }
    body { background: #fff; }
    .container { max-width: 100%; padding: 0; }
    .schedule-container { box-shadow: none; padding: 0; }
    th { background: #eee !important; -webkit-print-color-adjust: exact; }
    .time-col { background: #eee !important; -webkit-print-color-adjust: exact; }
    .cell-input { font-size: 12px; }
  }
</style>
</head>
<body>

<header>
  <h1>Timeplanlegger</h1>
  <a href="../tools.html" class="back-link"><span class="material-icons">arrow_back</span> Tilbake</a>
</header>

<div class="container">
  
  <div class="controls">
    <div>
      <h2 style="font-size: 24px; font-weight: 700;">Min Timeplan</h2>
      <p style="color: var(--text-muted); font-size: 14px;">Klikk i cellene for å redigere. Lagres automatisk.</p>
    </div>
    <div style="display: flex; gap: 12px;">
      <button class="btn btn-ghost" onclick="clearSchedule()">Nullstill</button>
      <button class="btn btn-primary" onclick="window.print()">
        <span class="material-icons">print</span> Skriv ut
      </button>
    </div>
  </div>

  <div class="schedule-container">
    <table id="scheduleTable">
      <thead>
        <tr>
          <th class="time-col">Tid</th>
          <th>Mandag</th>
          <th>Tirsdag</th>
          <th>Onsdag</th>
          <th>Torsdag</th>
          <th>Fredag</th>
        </tr>
      </thead>
      <tbody id="scheduleBody">
        <!-- Rows generated by JS -->
      </tbody>
    </table>
  </div>

</div>

<script>
  const times = [
    "08:00", "09:00", "10:00", "11:00", "12:00", "13:00", "14:00", "15:00"
  ];
  const days = ["mon", "tue", "wed", "thu", "fri"];

  function init() {
    const tbody = document.getElementById('scheduleBody');
    const savedData = JSON.parse(localStorage.getItem('scheduleData')) || {};

    times.forEach(time => {
      const row = document.createElement('tr');
      
      // Time cell
      const timeCell = document.createElement('td');
      timeCell.className = 'time-col';
      timeCell.textContent = time;
      row.appendChild(timeCell);

      // Day cells
      days.forEach(day => {
        const cell = document.createElement('td');
        const key = `${day}-${time}`;
        const val = savedData[key] || '';
        
        cell.innerHTML = `<textarea class="cell-input" placeholder="" oninput="saveCell('${key}', this.value)">${val}</textarea>`;
        row.appendChild(cell);
      });

      tbody.appendChild(row);
    });
  }

  function saveCell(key, value) {
    const data = JSON.parse(localStorage.getItem('scheduleData')) || {};
    data[key] = value;
    localStorage.setItem('scheduleData', JSON.stringify(data));
  }

  function clearSchedule() {
    if(confirm('Er du sikker på at du vil slette hele timeplanen?')) {
      localStorage.removeItem('scheduleData');
      location.reload();
    }
  }

  init();
</script>
</body>
</html>
